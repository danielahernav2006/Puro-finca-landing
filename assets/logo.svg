<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="pfGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8FC93A"/>
      <stop offset="100%" stop-color="#1F6B3A"/>
    </linearGradient>
    <linearGradient id="pfOrange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F18A1F"/>
      <stop offset="100%" stop-color="#E8661A"/>
    </linearGradient>
    <clipPath id="pfCircle">
      <circle cx="100" cy="108" r="72"/>
    </clipPath>
  </defs>

  <!-- Círculo principal con gradiente -->
  <circle cx="100" cy="108" r="72" fill="url(#pfGreen)"/>

  <!-- Paisaje interior: cielo sutil + campo + casa + árboles -->
  <g clip-path="url(#pfCircle)">
    <!-- Montañas de fondo -->
    <path d="M28 108 L55 88 L80 100 L100 85 L125 98 L150 82 L172 108 Z" fill="#2D8A4E" opacity="0.55"/>
    <!-- Tierra / surcos del campo -->
    <path d="M28 128 L172 128 L172 185 L28 185 Z" fill="#F7FBE8"/>
    <path d="M28 138 L172 138" stroke="#8FC93A" stroke-width="1.4" opacity="0.7"/>
    <path d="M28 150 L172 150" stroke="#8FC93A" stroke-width="1.4" opacity="0.65"/>
    <path d="M28 163 L172 163" stroke="#8FC93A" stroke-width="1.4" opacity="0.6"/>
    <path d="M28 176 L172 176" stroke="#8FC93A" stroke-width="1.4" opacity="0.55"/>

    <!-- Casa de campo -->
    <g transform="translate(82, 96)">
      <!-- Techo -->
      <path d="M0 12 L18 0 L36 12 L32 12 L32 28 L4 28 L4 12 Z" fill="#1F6B3A"/>
      <!-- Cuerpo -->
      <rect x="4" y="12" width="28" height="18" fill="#FBF7EE"/>
      <!-- Puerta -->
      <rect x="15" y="20" width="6" height="10" fill="#1F6B3A"/>
      <!-- Ventana -->
      <rect x="7" y="16" width="4" height="4" fill="#8FC93A"/>
      <rect x="25" y="16" width="4" height="4" fill="#8FC93A"/>
    </g>

    <!-- Árboles pequeños -->
    <g transform="translate(55, 100)">
      <rect x="3" y="12" width="2" height="6" fill="#1F6B3A"/>
      <circle cx="4" cy="10" r="6" fill="#2D8A4E"/>
    </g>
    <g transform="translate(138, 100)">
      <rect x="3" y="12" width="2" height="6" fill="#1F6B3A"/>
      <circle cx="4" cy="10" r="6" fill="#2D8A4E"/>
    </g>
    <g transform="translate(128, 104)">
      <rect x="3" y="10" width="2" height="5" fill="#1F6B3A"/>
      <circle cx="4" cy="9" r="5" fill="#47A85F"/>
    </g>
  </g>

  <!-- Arco superior naranja con texto "PURO FINCA" -->
  <g>
    <path id="pfArc" d="M 30 90 A 72 72 0 0 1 170 90" fill="none"/>
    <text font-family="'Fraunces', Georgia, serif" font-weight="800" font-size="22" fill="url(#pfOrange)" letter-spacing="2">
      <textPath href="#pfArc" startOffset="50%" text-anchor="middle">PURO FINCA</textPath>
    </text>
  </g>
</svg>
